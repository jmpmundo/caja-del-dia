<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F6E56" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Caja del Día" />
  <title>Caja del Día</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #0F6E56;
      --verde-light: #E1F5EE;
      --verde-dark: #085041;
      --rojo: #A32D2D;
      --rojo-light: #FCEBEB;
      --gris-bg: #F5F5F5;
      --gris-card: #FFFFFF;
      --gris-border: #E0E0E0;
      --gris-text: #666;
      --text: #1a1a1a;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gris-bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      background: var(--verde);
      color: white;
      padding: 48px 20px 20px;
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.3px; }
    header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    nav {
      display: flex;
      background: var(--verde-dark);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    nav button {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    nav button.active {
      color: white;
      border-bottom-color: white;
    }

    .section { display: none; padding: 16px; }
    .section.active { display: block; }

    .card {
      background: var(--gris-card);
      border-radius: var(--radius);
      border: 1px solid var(--gris-border);
      padding: 16px;
      margin-bottom: 12px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--gris-text);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field input[type=number],
    .field input[type=text] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid var(--gris-border);
      border-radius: var(--radius-sm);
      background: var(--gris-bg);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--verde);
      background: white;
    }

    .gastos-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .gastos-header span { font-size: 13px; color: var(--gris-text); font-weight: 500; }
    .gastos-total { font-size: 15px; font-weight: 600; color: var(--rojo); }

    .item-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-top: 1px solid var(--gris-border);
      gap: 8px;
    }
    .item-name { flex: 1; font-size: 14px; color: var(--text); text-transform: capitalize; }
    .item-val { font-size: 14px; color: var(--gris-text); min-width: 70px; text-align: right; }
    .del-btn {
      background: var(--rojo-light);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      color: var(--rojo);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--gris-border);
    }
    .add-row input:first-child { flex: 2; }
    .add-row input:nth-child(2) { flex: 1.3; }
    .add-row input {
      padding: 10px 10px;
      font-size: 14px;
      border: 1px solid var(--gris-border);
      border-radius: var(--radius-sm);
      background: var(--gris-bg);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      min-width: 0;
    }
    .add-row input:focus { border-color: var(--verde); background: white; }
    .add-btn {
      background: var(--verde);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      width: 42px;
      height: 42px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-calc {
      width: 100%;
      padding: 15px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .btn-calc:active { opacity: 0.85; }

    .result-box {
      background: var(--verde-light);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
      border: 1px solid #9FE1CB;
    }
    .result-box.negativo { background: var(--rojo-light); border-color: #F7C1C1; }
    .result-label { font-size: 13px; color: var(--gris-text); margin-bottom: 6px; }
    .result-amount { font-size: 34px; font-weight: 700; color: var(--verde-dark); }
    .result-amount.negativo { color: var(--rojo); }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--gris-border);
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .lbl { color: var(--gris-text); }
    .breakdown-row .val { font-weight: 600; }
    .val.pos { color: var(--verde); }
    .val.neg { color: var(--rojo); }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .btn-link {
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      color: var(--gris-text);
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }

    .hist-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gris-text);
      font-size: 14px;
    }
    .hist-empty span { font-size: 40px; display: block; margin-bottom: 12px; }

    .hist-card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--gris-border);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .hist-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .hist-fecha { font-size: 14px; font-weight: 600; color: var(--text); }
    .hist-monto { font-size: 16px; font-weight: 700; }
    .hist-monto.pos { color: var(--verde); }
    .hist-monto.neg { color: var(--rojo); }
    .hist-detalle {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--gris-text);
      flex-wrap: wrap;
    }
    .hist-toggle {
      background: none;
      border: none;
      color: var(--verde);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 0 0;
      display: block;
    }
    .hist-items {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--gris-border);
    }
    .hist-item { display: flex; justify-content: space-between; font-size: 13px; color: var(--gris-text); padding: 3px 0; }
    .hist-del {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .chip::before { content: attr(data-icon); }
  </style>
</head>
<body>

<header>
  <h1>🧾 Caja del Día</h1>
  <p id="fecha-header"></p>
</header>

<nav>
  <button class="active" onclick="showSection('calc', this)">📋 Calcular</button>
  <button onclick="showSection('hist', this)">📅 Historial</button>
</nav>

<div id="sect-calc" class="section active">
  <div class="card">
    <div class="field">
      <label>💵 Vuelto que llevé</label>
      <input type="number" id="vuelto" placeholder="Ej: 3550" inputmode="decimal" />
    </div>
    <div class="field">
      <label>💰 Total cobrado en ventas</label>
      <input type="number" id="ventas" placeholder="Ej: 40500" inputmode="decimal" />
    </div>
  </div>

  <div class="card">
    <div class="gastos-header">
      <span>🛒 Gastos personales</span>
      <span class="gastos-total" id="total-gastos-lbl">$0,00</span>
    </div>
    <div id="items-list"></div>
    <div class="add-row">
      <input type="text" id="item-nombre" placeholder="Ej: pan" inputmode="text" />
      <input type="number" id="item-monto" placeholder="Monto" inputmode="decimal" />
      <button class="add-btn" onclick="agregarItem()">+</button>
    </div>
  </div>

  <button class="btn-calc" onclick="calcular()">Calcular →</button>

  <div id="resultado" style="display:none; margin-top:16px">
    <div class="result-box" id="result-box">
      <p class="result-label">Dinero en mano al final del día</p>
      <p class="result-amount" id="total-display">$0</p>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="breakdown-row">
        <span class="lbl">💵 Vuelto inicial</span>
        <span class="val pos" id="b-vuelto">$0</span>
      </div>
      <div class="breakdown-row">
        <span class="lbl">💰 Ventas cobradas</span>
        <span class="val pos" id="b-ventas">$0</span>
      </div>
      <div class="breakdown-row">
        <span class="lbl">🛒 Gastos personales</span>
        <span class="val neg" id="b-gastos">$0</span>
      </div>
    </div>
    <button class="btn-save" onclick="guardarYReset()">💾 Guardar en historial</button>
    <button class="btn-link" onclick="soloReset()">↺ Nueva consulta sin guardar</button>
  </div>
</div>

<div id="sect-hist" class="section">
  <div id="hist-container"></div>
</div>

<script>
  const KEY = 'cajadeldia_historial';
  let items = [];

  const hoy = new Date();
  document.getElementById('fecha-header').textContent =
    hoy.toLocaleDateString('es-AR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

  function fmt(n) {
    return '$' + Math.abs(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('sect-' + id).classList.add('active');
    btn.classList.add('active');
    if (id === 'hist') renderHist();
  }

  function actualizarTotalGastos() {
    const tot = items.reduce((a, i) => a + i.monto, 0);
    document.getElementById('total-gastos-lbl').textContent = fmt(tot);
  }

  function renderItems() {
    const el = document.getElementById('items-list');
    el.innerHTML = '';
    items.forEach((it, idx) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML =
        '<span class="item-name">' + it.nombre + '</span>' +
        '<span class="item-val">' + fmt(it.monto) + '</span>' +
        '<button class="del-btn" onclick="eliminarItem(' + idx + ')">×</button>';
      el.appendChild(row);
    });
    actualizarTotalGastos();
  }

  function agregarItem() {
    const nombre = document.getElementById('item-nombre').value.trim();
    const monto = parseFloat(document.getElementById('item-monto').value) || 0;
    if (!nombre || monto <= 0) return;
    items.push({ nombre, monto });
    document.getElementById('item-nombre').value = '';
    document.getElementById('item-monto').value = '';
    renderItems();
    document.getElementById('item-nombre').focus();
  }

  function eliminarItem(idx) {
    items.splice(idx, 1);
    renderItems();
  }

  function calcular() {
    const vuelto = parseFloat(document.getElementById('vuelto').value) || 0;
    const ventas = parseFloat(document.getElementById('ventas').value) || 0;
    const gastos = items.reduce((a, i) => a + i.monto, 0);
    const total = vuelto + ventas - gastos;

    document.getElementById('b-vuelto').textContent = fmt(vuelto);
    document.getElementById('b-ventas').textContent = fmt(ventas);
    document.getElementById('b-gastos').textContent = '−' + fmt(gastos);

    const el = document.getElementById('total-display');
    el.textContent = (total < 0 ? '−' : '') + fmt(total);
    el.className = 'result-amount' + (total < 0 ? ' negativo' : '');

    const box = document.getElementById('result-box');
    box.className = 'result-box' + (total < 0 ? ' negativo' : '');

    document.getElementById('resultado').style.display = 'block';
    document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });
  }

  function getHistorial() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { return []; }
  }
  function saveHistorial(h) {
    try { localStorage.setItem(KEY, JSON.stringify(h)); } catch(e) {}
  }

  function guardarYReset() {
    const vuelto = parseFloat(document.getElementById('vuelto').value) || 0;
    const ventas = parseFloat(document.getElementById('ventas').value) || 0;
    const gastos = items.reduce((a, i) => a + i.monto, 0);
    const total = vuelto + ventas - gastos;
    const h = getHistorial();
    h.unshift({
      fecha: hoy.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' }),
      fechaLarga: hoy.toLocaleDateString('es-AR', { weekday:'long', day:'2-digit', month:'long' }),
      vuelto, ventas, gastos, total,
      items: [...items]
    });
    saveHistorial(h);
    soloReset();
    alert('✅ Guardado en el historial.');
  }

  function soloReset() {
    document.getElementById('vuelto').value = '';
    document.getElementById('ventas').value = '';
    items = [];
    renderItems();
    document.getElementById('resultado').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderHist() {
    const h = getHistorial();
    const el = document.getElementById('hist-container');
    if (!h.length) {
      el.innerHTML = '<div class="hist-empty"><span>📭</span>Todavía no hay registros guardados.<br>Calculá tu primer día y guardalo.</div>';
      return;
    }
    el.innerHTML = '';
    h.forEach((rec, idx) => {
      const card = document.createElement('div');
      card.className = 'hist-card';
      const hasItems = rec.items && rec.items.length > 0;
      const tid = 'hi-' + idx;
      card.innerHTML =
        '<div class="hist-top">' +
          '<span class="hist-fecha">📅 ' + (rec.fechaLarga || rec.fecha) + '</span>' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<span class="hist-monto ' + (rec.total >= 0 ? 'pos' : 'neg') + '">' + (rec.total < 0 ? '−' : '') + fmt(rec.total) + '</span>' +
            '<button class="hist-del" onclick="borrarReg(' + idx + ')" title="Borrar">🗑</button>' +
          '</div>' +
        '</div>' +
        '<div class="hist-detalle">' +
          '<span>💵 ' + fmt(rec.vuelto) + '</span>' +
          '<span>💰 ' + fmt(rec.ventas) + '</span>' +
          '<span>🛒 ' + fmt(rec.gastos) + '</span>' +
        '</div>' +
        (hasItems ?
          '<button class="hist-toggle" onclick="toggleItems(\'' + tid + '\', this)">▼ Ver detalle de gastos</button>' +
          '<div id="' + tid + '" class="hist-items" style="display:none">' +
            rec.items.map(it => '<div class="hist-item"><span>' + it.nombre + '</span><span>' + fmt(it.monto) + '</span></div>').join('') +
          '</div>'
        : '');
      el.appendChild(card);
    });
  }

  function toggleItems(id, btn) {
    const el = document.getElementById(id);
    const vis = el.style.display !== 'none';
    el.style.display = vis ? 'none' : 'block';
    btn.textContent = vis ? '▼ Ver detalle de gastos' : '▲ Ocultar detalle';
  }

  function borrarReg(idx) {
    if (!confirm('¿Borrar este registro?')) return;
    const h = getHistorial();
    h.splice(idx, 1);
    saveHistorial(h);
    renderHist();
  }

  document.getElementById('item-nombre').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('item-monto').focus();
  });
  document.getElementById('item-monto').addEventListener('keydown', e => {
    if (e.key === 'Enter') agregarItem();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
